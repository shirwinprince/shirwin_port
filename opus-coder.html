<!DOCTYPE html>
<html>
<head>
    <title>Claude Opus 4.6 Pro Assistant</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root { --bg: #0d1117; --sidebar: #161b22; --text: #c9d1d9; --accent: #238636; --stop: #da3633; --code-bg: #161b22; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; margin: 0; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; }
        .message-container { margin-bottom: 25px; border-radius: 8px; position: relative; max-width: 900px; margin-left: auto; margin-right: auto; }
        .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; opacity: 0.7; }
        .user-label { color: #58a6ff; }
        .opus-label { color: #ffa657; }

        /* Code block styling */
        pre[class*="language-"] { border-radius: 8px; border: 1px solid #30363d !important; margin: 0 !important; background: var(--code-bg) !important; }
        .content { white-space: pre-wrap; word-break: break-word; }

        /* UI Controls */
        .controls { position: absolute; top: 0; right: 0; display: flex; gap: 5px; }
        .ui-btn { background: #30363d; color: #f0f6f8; border: 1px solid #8b949e; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .ui-btn:hover { background: #444; }

        #input-panel { padding: 20px; background: var(--sidebar); border-top: 1px solid #30363d; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; }
        textarea { flex: 1; height: 100px; background: #0d1117; color: white; border: 1px solid #30363d; padding: 12px; border-radius: 6px; resize: none; outline: none; font-family: monospace; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .main-btn { padding: 0 20px; height: 45px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; }
        #send-btn { background: var(--accent); }
        #stop-btn { background: var(--stop); display: none; } /* Hidden by default */
        #send-btn:disabled { opacity: 0.5; }

        .download-cv-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--accent);
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
        }
        .download-cv-btn:hover { background: #2ea043; }
    </style>
</head>
<body>

    <a href="/AIML%20ATS.pdf" class="download-cv-btn" download="AIML ATS.pdf">Download CV</a>

    <div id="chat-window">
        <div style="text-align: center; color: #8b949e; margin-top: 15%;">
            <h2>Claude Opus 4.6</h2>
            <p>Paste your code and ask for a fix. Highlighting and Stop button active.</p>
        </div>
    </div>

    <div id="input-panel">
        <div class="input-row">
            <textarea id="prompt" placeholder="Ask anything... (e.g. 'Refactor this function...')"></textarea>
            <div class="btn-group">
                <button id="send-btn" class="main-btn">Send Query</button>
                <button id="stop-btn" class="main-btn">Stop</button>
            </div>
        </div>
    </div>

    <script src="https://js.puter.com/v2/"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <script>
        const sendBtn = document.getElementById('send-btn');
        const stopBtn = document.getElementById('stop-btn');
        const promptInput = document.getElementById('prompt');
        const chatWindow = document.getElementById('chat-window');

        let isRunning = false;
        let currentStream = null;

        async function copyCode(text, btn) {
            await navigator.clipboard.writeText(text);
            btn.innerText = "✓ Copied";
            setTimeout(() => btn.innerText = "Copy", 2000);
        }

        async function handleSend() {
            const query = promptInput.value.trim();
            if(!query || isRunning) return;

            isRunning = true;
            chatWindow.innerHTML = ''; // Clear for fresh look
            
            // UI Update
            sendBtn.style.display = 'none';
            stopBtn.style.display = 'block';

            // User Message
            chatWindow.innerHTML += `<div class="message-container"><span class="label user-label">Your Request</span><div class="content">${query}</div></div>`;
            
            // Opus Message Container
            const container = document.createElement('div');
            container.className = 'message-container';
            container.innerHTML = `
                <span class="label opus-label">Claude Opus 4.6 Output</span>
                <div class="controls"><button class="ui-btn" id="last-copy">Copy</button></div>
                <pre class="language-javascript"><code id="code-output"></code></pre>`;
            chatWindow.appendChild(container);

            const codeElement = document.getElementById('code-output');
            const copyBtn = document.getElementById('last-copy');

            try {
                promptInput.value = '';
                
                // Start Puter Stream
                currentStream = await puter.ai.chat(query, { model: 'claude-opus-4-6', stream: true });

                let fullText = "";
                for await (const part of currentStream) {
                    if (!isRunning) break; // Exit if stop button pressed
                    
                    if (part?.text) {
                        fullText += part.text;
                        codeElement.textContent = fullText;
                        
                        // Apply syntax highlighting
                        Prism.highlightElement(codeElement);
                        chatWindow.scrollTop = chatWindow.scrollHeight;
                    }
                }

                copyBtn.onclick = () => copyCode(fullText, copyBtn);

            } catch (err) {
                codeElement.innerText = "Error: " + err.message;
            } finally {
                stopStream();
            }
        }

        function stopStream() {
            isRunning = false;
            currentStream = null;
            sendBtn.style.display = 'block';
            stopBtn.style.display = 'none';
        }

        sendBtn.onclick = handleSend;
        stopBtn.onclick = stopStream;

        promptInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
